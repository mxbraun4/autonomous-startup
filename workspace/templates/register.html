{% extends "base.html" %}

{% block title %}Register - Startup-VC Matching Platform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>Create Your Account</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">I am a:</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="user_type" id="startup" value="startup" checked onchange="toggleFields()">
                            <label class="form-check-label" for="startup">
                                Startup
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="user_type" id="vc" value="vc" onchange="toggleFields()">
                            <label class="form-check-label" for="vc">
                                Investor (VC)
                            </label>
                        </div>
                    </div>
                    
                    <div id="startupFields">
                        <div class="mb-3">
                            <label for="company_name" class="form-label">Company Name</label>
                            <input type="text" class="form-control" id="company_name" name="company_name" required>
                        </div>
                    </div>
                    
                    <div id="vcFields" style="display: none;">
                        <div class="mb-3">
                            <label for="firm_name" class="form-label">Firm Name</label>
                            <input type="text" class="form-control" id="firm_name" name="firm_name" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                
                <p class="mt-3 text-center">
                    Already have an account? <a href="{{ url_for('login') }}">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
function toggleFields() {
    const userType = document.querySelector('input[name="user_type"]:checked').value;
    if (userType === 'startup') {
        document.getElementById('startupFields').style.display = 'block';
        document.getElementById('vcFields').style.display = 'none';
    } else {
        document.getElementById('startupFields').style.display = 'none';
        document.getElementById('vcFields').style.display = 'block';
    }
}
</script>
{% endblock %}

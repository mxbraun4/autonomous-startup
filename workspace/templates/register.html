{% extends "base.html" %}

{% block title %}Register - Startup-VC Matcher{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus display-1 text-success"></i>
                    <h2 class="mt-3">Create Account</h2>
                    <p class="text-muted">Join our startup-investor matching platform</p>
                </div>

                <form method="POST" action="{{ url_for('register') }}">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">I am a:</label>
                        <div class="row g-3">
                            <div class="col-6">
                                <div class="form-check custom-radio">
                                    <input class="form-check-input" type="radio" name="user_type" id="startup" value="startup" checked onchange="toggleFields()">
                                    <label class="form-check-label" for="startup">
                                        <i class="bi bi-rocket"></i> Startup
                                    </label>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="form-check custom-radio">
                                    <input class="form-check-input" type="radio" name="user_type" id="investor" value="investor" onchange="toggleFields()">
                                    <label class="form-check-label" for="investor">
                                        <i class="bi bi-currency-bitcoin"></i> Investor
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Startup fields -->
                    <div id="startup-fields">
                        <h5 class="mb-3">Startup Details</h5>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="company_name" class="form-label">Company Name</label>
                                <input type="text" class="form-control" id="company_name" name="company_name">
                            </div>
                            <div class="col-md-6">
                                <label for="industry" class="form-label">Industry</label>
                                <select class="form-select" id="industry" name="industry">
                                    <option value="Technology">Technology</option>
                                    <option value="Healthcare">Healthcare</option>
                                    <option value="Fintech">Fintech</option>
                                    <option value="E-commerce">E-commerce</option>
                                    <option value="AI/ML">AI/ML</option>
                                    <option value="SaaS">SaaS</option>
                                    <option value="Clean Energy">Clean Energy</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="funding_stage" class="form-label">Funding Stage</label>
                            <select class="form-select" id="funding_stage" name="funding_stage">
                                <option value="Pre-Seed">Pre-Seed</option>
                                <option value="Seed">Seed</option>
                                <option value="Series A">Series A</option>
                                <option value="Series B">Series B</option>
                                <option value="Series C+">Series C+</option>
                            </select>
                        </div>
                    </div>

                    <!-- Investor fields -->
                    <div id="investor-fields" style="display: none;">
                        <h5 class="mb-3">Investor Details</h5>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="contact_name" class="form-label">Contact Name</label>
                                <input type="text" class="form-control" id="contact_name" name="contact_name">
                            </div>
                            <div class="col-md-6">
                                <label for="firm_name" class="form-label">Firm Name</label>
                                <input type="text" class="form-control" id="firm_name" name="firm_name">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mb-3">Create Account</button>
                </form>

                <div class="text-center">
                    <p class="text-muted">Already have an account? 
                        <a href="{{ url_for('login') }}">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function toggleFields() {
    const isStartup = document.getElementById('startup').checked;
    document.getElementById('startup-fields').style.display = isStartup ? 'block' : 'none';
    document.getElementById('investor-fields').style.display = isStartup ? 'none' : 'block';
}
</script>
{% endblock %}

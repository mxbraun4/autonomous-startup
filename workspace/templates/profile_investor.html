{% extends "layout.html" %}

{% block title %}Investor Profile - Startup-VC Match{% endblock %}

{% block content %}
<h1 class="mb-4">{% if profile %}Edit Investor Profile{% else %}Create Investor Profile{% endif %}</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="firm_name" class="form-label">Firm Name *</label>
                    <input type="text" class="form-control" id="firm_name" name="firm_name" 
                           value="{{ profile.firm_name if profile else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="industry_focus" class="form-label">Industry Focus *</label>
                    <select class="form-select" id="industry_focus" name="industry_focus" required>
                        <option value="">Select Industry</option>
                        <option value="AI/ML" {% if profile and profile.industry_focus == 'AI/ML' %}selected{% endif %}>AI/ML</option>
                        <option value="Fintech" {% if profile and profile.industry_focus == 'Fintech' %}selected{% endif %}>Fintech</option>
                        <option value="Healthcare" {% if profile and profile.industry_focus == 'Healthcare' %}selected{% endif %}>Healthcare</option>
                        <option value="E-commerce" {% if profile and profile.industry_focus == 'E-commerce' %}selected{% endif %}>E-commerce</option>
                        <option value="SaaS" {% if profile and profile.industry_focus == 'SaaS' %}selected{% endif %}>SaaS</option>
                        <option value="EdTech" {% if profile and profile.industry_focus == 'EdTech' %}selected{% endif %}>EdTech</option>
                        <option value="CleanTech" {% if profile and profile.industry_focus == 'CleanTech' %}selected{% endif %}>CleanTech</option>
                        <option value="Other" {% if profile and profile.industry_focus == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ profile.description if profile else '' }}</textarea>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="stage_focus" class="form-label">Stage Focus *</label>
                    <select class="form-select" id="stage_focus" name="stage_focus" required>
                        <option value="">Select Stage</option>
                        <option value="Pre-seed" {% if profile and profile.stage_focus == 'Pre-seed' %}selected{% endif %}>Pre-seed</option>
                        <option value="Seed" {% if profile and profile.stage_focus == 'Seed' %}selected{% endif %}>Seed</option>
                        <option value="Series A" {% if profile and profile.stage_focus == 'Series A' %}selected{% endif %}>Series A</option>
                        <option value="Series B+" {% if profile and profile.stage_focus == 'Series B+' %}selected{% endif %}>Series B+</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="location" class="form-label">Location</label>
                    <input type="text" class="form-control" id="location" name="location" 
                           value="{{ profile.location if profile else '' }}">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="website" class="form-label">Website</label>
                    <input type="url" class="form-control" id="website" name="website" 
                           value="{{ profile.website if profile else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="investment_range" class="form-label">Investment Range</label>
                    <input type="text" class="form-control" id="investment_range" name="investment_range" 
                           value="{{ profile.investment_range if profile else '' }}">
                </div>
            </div>
            
            <div class="mb-3">
                <label for="portfolio_size" class="form-label">Portfolio Size</label>
                <input type="number" class="form-control" id="portfolio_size" name="portfolio_size" 
                       value="{{ profile.portfolio_size if profile else '0' }}" min="0">
            </div>
            
            <button type="submit" class="btn btn-primary">Save Profile</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

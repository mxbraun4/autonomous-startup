{% extends "layout.html" %}

{% block title %}Startup Profile - Startup-VC Match{% endblock %}

{% block content %}
<h1 class="mb-4">{% if profile %}Edit Startup Profile{% else %}Create Startup Profile{% endif %}</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="company_name" class="form-label">Company Name *</label>
                    <input type="text" class="form-control" id="company_name" name="company_name" 
                           value="{{ profile.company_name if profile else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="industry" class="form-label">Industry *</label>
                    <select class="form-select" id="industry" name="industry" required>
                        <option value="">Select Industry</option>
                        <option value="AI/ML" {% if profile and profile.industry == 'AI/ML' %}selected{% endif %}>AI/ML</option>
                        <option value="Fintech" {% if profile and profile.industry == 'Fintech' %}selected{% endif %}>Fintech</option>
                        <option value="Healthcare" {% if profile and profile.industry == 'Healthcare' %}selected{% endif %}>Healthcare</option>
                        <option value="E-commerce" {% if profile and profile.industry == 'E-commerce' %}selected{% endif %}>E-commerce</option>
                        <option value="SaaS" {% if profile and profile.industry == 'SaaS' %}selected{% endif %}>SaaS</option>
                        <option value="EdTech" {% if profile and profile.industry == 'EdTech' %}selected{% endif %}>EdTech</option>
                        <option value="CleanTech" {% if profile and profile.industry == 'CleanTech' %}selected{% endif %}>CleanTech</option>
                        <option value="Other" {% if profile and profile.industry == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ profile.description if profile else '' }}</textarea>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="stage" class="form-label">Stage *</label>
                    <select class="form-select" id="stage" name="stage" required>
                        <option value="">Select Stage</option>
                        <option value="Pre-seed" {% if profile and profile.stage == 'Pre-seed' %}selected{% endif %}>Pre-seed</option>
                        <option value="Seed" {% if profile and profile.stage == 'Seed' %}selected{% endif %}>Seed</option>
                        <option value="Series A" {% if profile and profile.stage == 'Series A' %}selected{% endif %}>Series A</option>
                        <option value="Series B+" {% if profile and profile.stage == 'Series B+' %}selected{% endif %}>Series B+</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="location" class="form-label">Location</label>
                    <input type="text" class="form-control" id="location" name="location" 
                           value="{{ profile.location if profile else '' }}">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="website" class="form-label">Website</label>
                    <input type="url" class="form-control" id="website" name="website" 
                           value="{{ profile.website if profile else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="funding_needed" class="form-label">Funding Needed</label>
                    <input type="text" class="form-control" id="funding_needed" name="funding_needed" 
                           value="{{ profile.funding_needed if profile else '' }}">
                </div>
            </div>
            
            <div class="mb-3">
                <label for="team_size" class="form-label">Team Size</label>
                <input type="number" class="form-control" id="team_size" name="team_size" 
                       value="{{ profile.team_size if profile else '1' }}" min="1">
            </div>
            
            <button type="submit" class="btn btn-primary">Save Profile</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

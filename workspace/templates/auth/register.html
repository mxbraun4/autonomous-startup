{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-person-plus"></i> Register</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('register') }}" id="registerForm" onsubmit="return validatePasswords()">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name / Company Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" minlength="8" required>
                        <small class="text-muted">Must be at least 8 characters</small>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="user_type" class="form-label">I am a...</label>
                        <select class="form-select" id="user_type" name="user_type" required>
                            <option value="">Select type</option>
                            <option value="startup">Startup</option>
                            <option value="vc">Venture Capitalist</option>
                        </select>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Register</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function validatePasswords() {
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    const errorDiv = document.getElementById('passwordError');
    
    if (password.value !== confirmPassword.value) {
        if (!errorDiv) {
            const newError = document.createElement('div');
            newError.id = 'passwordError';
            newError.className = 'alert alert-danger mt-2';
            newError.textContent = 'Passwords do not match!';
            confirmPassword.parentNode.appendChild(newError);
        }
        return false;
    }
    
    if (errorDiv) {
        errorDiv.remove();
    }
    return true;
}

document.getElementById('confirm_password').addEventListener('input', function() {
    const password = document.getElementById('password').value;
    const confirmPassword = this.value;
    let errorDiv = document.getElementById('passwordError');
    
    if (password && confirmPassword && password !== confirmPassword) {
        if (!errorDiv) {
            errorDiv = document.createElement('div');
            errorDiv.id = 'passwordError';
            errorDiv.className = 'alert alert-danger mt-2';
            this.parentNode.appendChild(errorDiv);
        }
        errorDiv.textContent = 'Passwords do not match!';
    } else if (errorDiv) {
        errorDiv.remove();
    }
});
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Startup-VC Marketplace</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav>
    <div class="container">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="founders.html">Founders</a></li>
        <li><a href="investors.html">Investors</a></li>
        <li><a href="signup.html">Sign Up</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <h2>Sign Up</h2>

    <section class="form-section">
      <h3>Founder Signup</h3>
      <form id="founder-form" action="#" method="post">
        <div class="form-group">
          <label for="founder-email">Email</label>
          <input type="email" id="founder-email" name="email" placeholder="you@startup.com" required>
        </div>
        <div class="form-group">
          <label for="founder-sector">Sector</label>
          <input type="text" id="founder-sector" name="sector" placeholder="e.g. FinTech, HealthTech" required>
        </div>
        <div class="form-group">
          <label for="founder-stage">Stage</label>
          <input type="text" id="founder-stage" name="stage" placeholder="e.g. Pre-Seed, Seed, Series A" required>
        </div>
        <div class="form-group">
          <label for="founder-geography">Geography</label>
          <input type="text" id="founder-geography" name="geography" placeholder="e.g. US, Europe, Global" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign Up as Founder</button>
      </form>
    </section>

    <section class="form-section">
      <h3>VC Signup</h3>
      <form id="vc-form" action="#" method="post">
        <div class="form-group">
          <label for="vc-email">Email</label>
          <input type="email" id="vc-email" name="email" placeholder="you@fund.vc" required>
        </div>
        <div class="form-group">
          <label for="vc-thesis-sectors">Thesis Sectors</label>
          <input type="text" id="vc-thesis-sectors" name="thesis_sectors" placeholder="e.g. AI, SaaS, Climate" required>
        </div>
        <div class="form-group">
          <label for="vc-stage-focus">Stage Focus</label>
          <input type="text" id="vc-stage-focus" name="stage_focus" placeholder="e.g. Seed, Series A, Growth" required>
        </div>
        <div class="form-group">
          <label for="vc-geography">Geography</label>
          <input type="text" id="vc-geography" name="geography" placeholder="e.g. US, Europe, Global" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign Up as Investor</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
